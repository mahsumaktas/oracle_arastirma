m](https://the-decoder.com) | \ud83d\udd34 |\n| 4 | **Mirendil \u2014 Anthropic'ten Neo-Lab, $175M, $1B De\u011ferleme** (14 Mart): Anthropic'ten Behnam Neyshabur (CEO) + Harsh Mehta (CTO) taraf\u0131ndan kuruldu. Biyoloji ve malzeme bilimi i\u00e7in AI ara\u015ft\u0131rma odakl\u0131. A16Z + Kleiner Perkins co-lead. xAI ve OpenAI mezunlar\u0131 da ekipte. | KAT-1/KAT-9 | [the-decoder.com](https://the-decoder.com) \u00b7 [theinformation.com](https://theinformation.com) | \ud83d\udd34 |\n| 5 | **Ai2 MolmoBot \u2014 Tamamen Sim\u00fclasyonda E\u011fitildi, Ger\u00e7ek D\u00fcnyada S\u0131f\u0131r-Shot** (The Decoder): Allen AI'dan MolmoSpaces (230.000+ i\u00e7 mekan sahnesi, 42M+ tutma anotasyonu) + MolmoBot (\u00e7ekme, a\u00e7ma, kald\u0131rma \u2014 hi\u00e7 ger\u00e7ek veri g\u00f6rmeden). Zero-shot sim-to-real transfer. | KAT-3/KAT-8 | [allenai.org](https://allenai.org/blog/molmobot-robot-manipulation) \u00b7 [the-decoder.com](https://the-decoder.com) | \ud83d\udfe1 |\n| 6 | **Hume AI TADA \u2014 Hall\u00fcsinasyonsuz TTS, 5x H\u0131zl\u0131, MIT Lisans** (The Decoder): Her metin token'\u0131na tam 1 ses sinyali \u2014 s\u0131f\u0131r transkripsiyon hall\u00fcsinasyonu (1000+ \u00f6rnekte). Kar\u015f\u0131la\u015ft\u0131r\u0131labilir sistemlerden 5x h\u0131zl\u0131. 1B (\u0130ngilizce) + 3B (8 dil). Smartphone'da \u00e7al\u0131\u015f\u0131yor. | KAT-3 | [github.com/HumeAI/tada](https://github.com/HumeAI/tada) \u00b7 [arxiv:2602.23068](https://arxiv.org/abs/2602.23068) | \ud83d\udfe1 |\n| 7 | **\u00c7in AI Agent Furyas\u0131 \u2014 7 \u015eehir OpenClaw Subsidi Ba\u015flatt\u0131** (The Decoder + SCMP): Hefei, Shenzhen (her biri $1.4M), Wuxi, Changshu, Changzhou, Nanjing \u2014 \"tek ki\u015filik \u015firket + AI \u00e7al\u0131\u015fan\" modeli. \u00c7in'de bireysel kurucu + AI agent ekibi = yeni \u00e7al\u0131\u015fma modeli. | KAT-5/KAT-7 | [the-decoder.com](https://the-decoder.com) \u00b7 [scmp.com](https://www.scmp.com/tech/tech-trends/article/3346513/) | \ud83d\udfe1 |\n\n**Dedupe notu:** 03-14 raporundaki maddeler elendi \u2014 Claude Sonnet 4.6 duyurusu, Claude Code /btw komutu, Anthropic Institute $100M, Figure Helix 02, xAI insan em\u00fclat\u00f6rleri, Karpathy autoresearch, VC rekorlar\u0131 tekrarlanmad\u0131.\n\n---\n\n## \ud83e\udd16 KAT-1 \u00b7 AI Laboratuvarlar\u0131 & Model Haberleri\n\n**Anthropic:**\n- Claude Opus 4.6 + Sonnet 4.6 \u2014 1M context GA standart fiyata d\u00fc\u015ft\u00fc (13 Mart) [\ud83d\udd17](https://the-decoder.com)\n- Medya limiti: 100 \u2192 600 g\u00f6rsel/PDF sayfa \u2014 Claude Code Max/Team/Enterprise'da aktif\n- Mirendil neo-lab: Anthropic'ten \u00e7\u0131kan ara\u015ft\u0131rmac\u0131lar $175M toplayor ($1B de\u011ferleme) [\ud83d\udd17](https://the-decoder.com)\n- DoW (Department of War) gerilimi s\u00fcrmekte \u2014 Anthropic resmi a\u00e7\u0131klamalarla yan\u0131t veriyor [\ud83d\udd17](https://anthropic.com/news/where-stand-department-war)\n\n**Meta:**\n- Reuters: %20 i\u015fg\u00fcc\u00fc kesintisi plan\u0131 (~16.000 ki\u015fi) \u2014 AI maliyet bask\u0131s\u0131 ana sebep [\ud83d\udd17](https://reuters.com)\n- Zuckerberg $600B AI yat\u0131r\u0131m plan\u0131 2028'e kadar devam ediyor\n- Manus (\u00c7in AI startup) sat\u0131n al\u0131m\u0131 \u00c7in ihracat kontrol soru\u015fturmas\u0131nda [\ud83d\udd17](https://the-decoder.com)\n\n**xAI:**\n- 12 kurucu ortaktan 6's\u0131 ayr\u0131ld\u0131 \u2014 Elon: \"ilk seferinde do\u011fru kurulmad\u0131\"\n- Cursor'dan iki k\u0131demli coding AI m\u00fchendisi transfer edildi\n\n**Amazon / Block:**\n- Amazon k\u0131demli m\u00fchendisleri AI kodu insan filtresi yap\u0131yor \u2014 seri kesinti sonras\u0131 [\ud83d\udd17](https://the-decoder.com)\n- Block neredeyse yar\u0131 i\u015fg\u00fcc\u00fcn\u00fc kesti \u2014 Dorsey AI'\u0131 krediled\u0131 ancak sebepler daha \u00f6nce ba\u015flam\u0131\u015ft\u0131 [\ud83d\udd17](https://the-decoder.com)\n\n---\n\n## \ud83d\udee0\ufe0f KAT-2 \u00b7 Geli\u015ftirici Ara\u00e7lar\u0131 & Altyap\u0131\n\n- **HuggingFace Storage Buckets** \u2014 Hub'da depolama bucket'lar\u0131 a\u00e7\u0131ld\u0131 (10 Mart) [\ud83d\udd17](https://huggingface.co/blog/storage-buckets)\n- **NVIDIA NeMo Retriever Agentic Retrieval Pipeline** \u2014 genelle\u015ftirilebilir ajansal eri\u015fim (13 Mart) [\ud83d\udd17](https://huggingface.co/blog/nvidia/nemo-retriever-agentic-retrieval)\n- **LeRobot v0.5.0** \u2014 her boyutu \u00f6l\u00e7eklendirme (HuggingFace robotik, 9 Mart) [\ud83d\udd17](https://huggingface.co/blog/lerobot-release-v050)\n- **OpenViking** (Volcengine) \u2014 AI Agent'lar i\u00e7in context veritaban\u0131 (memory+resources+skills, dosya sistemi paradigmas\u0131) \u2014 1.557 star bug\u00fcn [\ud83d\udd17](https://github.com/volcengine/OpenViking)\n- **Hindsight** (vectorize-io) \u2014 \"Agent Memory That Learns\" \u2014 502 star bug\u00fcn [\ud83d\udd17](https://github.com/vectorize-io/hindsight)\n- **OpenRAG** (Langflow) \u2014 tek paket RAG platformu (Langflow+Docling+Opensearch) \u2014 568 star bug\u00fcn [\ud83d\udd17](https://github.com/langflow-ai/openrag)\n- **MiroFish** \u2014 Swarm Intelligence Engine, \"Predict Anything\" \u2014 2.048 star bug\u00fcn [\ud83d\udd17](https://github.com/666ghj/MiroFish)\n- **Async RL Training Landscape** \u2014 16 a\u00e7\u0131k kaynak RL library kar\u015f\u0131la\u015ft\u0131rmas\u0131 (HuggingFace) [\ud83d\udd17](https://huggingface.co/blog/async-rl-training-landscape)\n\n---\n\n## \ud83d\udcda KAT-3 \u00b7 Ara\u015ft\u0131rma Makaleleri & Akademi\n\n- **MolmoBot** (Ai2/Allen AI) \u2014 230.000+ sim\u00fcle sahne, 42M+ fizik tabanl\u0131 tutma anotasyonu; zero-shot sim-to-real; ger\u00e7ek veri yok [\ud83d\udd17](https://allenai.org/blog/molmobot-robot-manipulation) \u00b7 [arxiv](https://allenai.org/papers/molmobot)\n- **Hume AI TADA** \u2014 metin-ses 1:1 e\u015fle\u015fme, s\u0131f\u0131r transkripsiyon hall\u00fcsinasyonu, 5x h\u0131z, MIT lisans, Llama tabanl\u0131 [\ud83d\udd17](https://arxiv.org/abs/2602.23068)\n- **arXiv cs.AI 13 Mart** \u2014 193 yeni submission (2603.12246 ba\u015fta) [\ud83d\udd17](https://arxiv.org/list/cs.AI/recent)\n- **Ulysses Sequence Parallelism** (HuggingFace) \u2014 milyon token context ile da\u011f\u0131t\u0131k e\u011fitim [\ud83d\udd17](https://huggingface.co/blog/ulysses-sp)\n- **Modular Diffusers** (HuggingFace) \u2014 composable, de\u011fi\u015ftirilebilir diffusion pipeline bloklar\u0131 [\ud83d\udd17](https://huggingface.co/blog/modular-diffusers)\n\n---\n\n## \ud83d\udde3\ufe0f KAT-4 \u00b7 D\u00fc\u015f\u00fcnce \u00d6nderleri & Topluluk\n\n- **Simon Willison** (14 Mart): Pragmatic Summit'te agentic engineering fireside chat. 1M context GA'y\u0131 fiyat kar\u015f\u0131la\u015ft\u0131rmas\u0131yla analiz etti: \"OpenAI 272K'dan, Gemini 200K'dan sonra ek \u00fccret al\u0131yor \u2014 Anthropic art\u0131k alm\u0131yor.\" [\ud83d\udd17](https://simonwillison.net/2026/Mar/14/pragmatic-summit/)\n- **p-e-w/heretic** GitHub: \"Dil modelleri i\u00e7in tam otomatik sans\u00fcr kald\u0131rma\" \u2014 GitHub trending (tart\u0131\u015fmal\u0131, sans\u00fcr/etik tart\u0131\u015fmalar\u0131) [\ud83d\udd17](https://github.com/p-e-w/heretic)\n- **\u00c7in AI krizi tart\u0131\u015fmas\u0131** \u2014 SCMP: \"Tek ki\u015filik \u015firket + AI \u00e7al\u0131\u015fan\" modelinin 7 \u015fehirde subsidi ile yayg\u0131nla\u015fmas\u0131 sosyal sentiment'i de\u011fi\u015ftiriyor [\ud83d\udd17](https://scmp.com/tech/tech-trends/article/3346513/)\n\n---\n\n## \ud83c\udfed KAT-5 \u00b7 Enterprise & End\u00fcstri Uygulamalar\u0131\n\n- **Meta %20 kesinti** \u2014 AI altyap\u0131 maliyetleri dengelemek i\u00e7in i\u015fg\u00fcc\u00fc azaltma [\ud83d\udd17](https://reuters.com)\n- **Amazon insan filtresi** \u2014 K\u0131demli m\u00fchendisler AI kodunu g\u00f6zden ge\u00e7irmek zorunda; seri kesinti AI hatalar\u0131ndan kaynakland\u0131 [\ud83d\udd17](https://the-decoder.com)\n- **Block yar\u0131 i\u015fg\u00fcc\u00fc** \u2014 Dorsey AI verimlili\u011fini krediled\u0131, ancak analistler ger\u00e7ek sebeplerin daha eski oldu\u011funu s\u00f6yl\u00fcyor [\ud83d\udd17](https://the-decoder.com)\n- **\u00c7in \"tek ki\u015filik \u015firket\"** \u2014 7 \u015fehir fonlama program\u0131; Shenzhen+Hefei her biri $1.4M, Wuxi $700K, Changshu $830K\n\n---\n\n## \ud83d\udd12 KAT-6 \u00b7 G\u00fcvenlik, Hizalama & Etik\n\n- **xAI kurucu \u00e7\u00f6k\u00fc\u015f\u00fc** \u2014 12'den 6 kurucu ayr\u0131ld\u0131; y\u00f6netim ve k\u00fclt\u00fcr sorunlar\u0131 d\u0131\u015far\u0131ya s\u0131zd\u0131\n- **Amazon AI kod g\u00fcvenli\u011fi** \u2014 Seri \u00fcretim kesintisi AI kodundan kaynakland\u0131; insan oversight zorunlu hale getirildi\n- **heretic repo** \u2014 LLM sans\u00fcr kald\u0131rma a\u00e7\u0131k kaynak toolu; etik/hukuki tart\u0131\u015fma ba\u015flad\u0131 [\ud83d\udd17](https://github.com/p-e-w/heretic)\n\n---\n\n## \ud83e\udde0 KAT-7 \u00b7 Meta-AI / Felsefe / Uzun Vade\n\n- **Sim-to-real transfer olgunla\u015f\u0131yor** \u2014 MolmoBot kan\u0131tlad\u0131: yeterince \u00e7e\u015fitli sim\u00fclasyon + fizik anotasyonu = ger\u00e7ek d\u00fcnya s\u0131f\u0131r-shot. Robotik veri u\u00e7urumu kapan\u0131yor.\n- **\"Tek ki\u015filik \u015firket + AI\"** \u2014 \u00c7in'de 7 y\u00f6netim bu modeli fonluyor. \u00c7al\u0131\u015fma bi\u00e7imi deneyi k\u00fcresel \u00f6l\u00e7ekte ilk kez devlet destekli somut form al\u0131yor.\n- **1:1 ses-metin e\u015fle\u015fmesi (TADA)** \u2014 \u00dcretken modellerde hall\u00fcsinasyonu s\u0131f\u0131ra indirme ba\u015far\u0131s\u0131 ses alan\u0131nda ilk; di\u011fer modaliteler i\u00e7in yol haritas\u0131 \u00e7iziyor.\n\n---\n\n## \ud83e\udd16 KAT-8 \u00b7 Robotik & Fiziksel AI\n\n- **Ai2 MolmoBot** \u2014 zero-shot sim-to-real: 230.000+ sahne, 130.000+ nesne, 42M+ tutma anotasyonu; a\u00e7\u0131k kaynak [\ud83d\udd17](https://allenai.org/blog/molmobot-robot-manipulation)\n- **LeRobot v0.5.0** \u2014 dataset recording, VLA fine-tuning, on-device optimizasyon [\ud83d\udd17](
