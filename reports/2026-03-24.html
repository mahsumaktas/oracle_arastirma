  var RAW = "# Gece Ara\u015ft\u0131rma \u2014 2026-03-24 (Sal\u0131 01:00 \u0130ST)\n\n> **Yenilik \u00d6nceli\u011fi** \u00b7 9/9 kategori \u00b7 Kaynaklar: HN, The Decoder, GitHub Trending, arXiv/HuggingFace \u00b7 Dedupe: 25 konu aktif listede \u00b7 web_search quota-exceeded \u2192 web_fetch fallback\n\n---\n\n## Top 7 \u2014 Sadece GER\u00c7EKTEN YEN\u0130 (Son 72 Saat Delta)\n\n| # | Madde | Kategori | Kaynak | \u00d6nem |\n|---|-------|----------|--------|------|\n| 1 | **OpenAI PE Firmalara %17.5 Garantili Getiri Teklifi** \u2014 Anthropic'e kar\u015f\u0131 enterprise sava\u015f\u0131nda OpenAI, TPG/Blackstone/Permira gibi firmalara %17.5 minimum return + yeni model erken eri\u015fim sunuyor. Anthropic garantisiz benzer g\u00f6r\u00fc\u015fmeler yap\u0131yor. Claude Code'un enterprise liderli\u011fi bu hamleyi h\u0131zland\u0131rd\u0131. [Reuters kaynakl\u0131 / The Decoder](https://the-decoder.com/) | KAT-1 | The Decoder, Reuters | KIRMIZI |\n| 2 | **Meta, Dreamer'\u0131 Acqui-hire Etti \u2014 Hugo Barra Geri D\u00f6nd\u00fc** \u2014 Dreamer AI startup'\u0131 t\u00fcm ekibiyle Meta Superintelligence Labs'a ge\u00e7ti. Eski Meta VP Hugo Barra y\u00f6netimi \u00fcstlendi. Bu y\u0131lki ikinci agent-AI hamlesi. [The Decoder](https://the-decoder.com/meta-acqui-hires-dreamers-entire-team/) | KAT-1 | The Decoder, WSJ | KIRMIZI |\n| 3 | **DGM-Hyperagents: Metacognitive Self-Modification** \u2014 Facebook Research (arXiv 2603.19461): g\u00f6rev agent + meta agent tek d\u00fczenlenebilir programda. Meta-level mekanizman\u0131n kendisi de d\u00fczenlenebilir \u2014 hem g\u00f6rev hem iyile\u015ftirme s\u00fcreci evrimle\u015fiyor. Coding d\u0131\u015f\u0131 domain'lerde de \u00e7al\u0131\u015f\u0131yor. [arXiv](https://arxiv.org/abs/2603.19461) | KAT-2 | arXiv cs.AI, Facebook Research | KIRMIZI |\n| 4 | **\u03bb-RLM: \u03bb-Calculus ile LLM Uzun-Context \u00c7\u00fcr\u00fcmesi \u00c7\u00f6z\u00fcm\u00fc** \u2014 Serbest recursive kod yerine tip g\u00fcvenli fonksiyonel runtime. 9 modelde 29/36 kar\u015f\u0131la\u015ft\u0131rmada standart RLM'yi ge\u00e7iyor, +21.9 puan, 4.1x h\u0131z kazanc\u0131. Open-source. [arXiv 2603.20105](https://arxiv.org/abs/2603.20105) | KAT-3 | arXiv cs.LG | KIRMIZI |\n| 5 | **Trivy GitHub Actions Tag Compromise \u2014 10.000+ Pipeline Risk Alt\u0131nda** \u2014 aquasecurity/trivy-action'da 75/76 versiyon tag'i force-push ile k\u00f6t\u00fc ama\u00e7l\u0131 infostealer payload'a y\u00f6nlendirildi. v0.69.4/5/6 + Docker Hub enfekte. Mart ay\u0131nda ikinci Trivy sald\u0131r\u0131s\u0131. [socket.dev](https://socket.dev/blog/trivy-under-attack-again-github-actions-compromise) | KAT-9 | socket.dev, HN | KIRMIZI |\n| 6 | **MiRA: A\u00e7\u0131k Model Gemma3-12B'yi %6.4'ten %43.0 SR'ye Ta\u015f\u0131d\u0131** \u2014 Milestone-tabanl\u0131 RL + subgoal decomposition. WebArena-Lite'ta GPT-4-Turbo (17.6%) ve GPT-4o (13.9%) ge\u00e7ildi. \u00d6nceki SOTA WebRL (38.4%) a\u015f\u0131ld\u0131. [arXiv 2603.19685](https://arxiv.org/abs/2603.19685) | KAT-2 | arXiv cs.AI/MA | SARI |\n| 7 | **iPhone 17 Pro 400B LLM \u00c7al\u0131\u015ft\u0131r\u0131yor** \u2014 HN #2 (406 puan, 220 yorum): ANEMLL Twitter demosu. On-device inference'da yeni referans noktas\u0131. [HN](https://news.ycombinator.com/item?id=47490070) | KAT-8 | HN, Twitter/@anemll | SARI |\n\n**Dedupe notu:** 25 madde aktif listede (LLM Circuit Finder, Newton 1.0, Xiaomi MiMo-V2, Cursor Composer 2, Claude Code Channels, Trump AI Politikas\u0131, BIGMAS, Grok 4.20, Cloudflare Bot 2027, WordPress AI, Microsoft Copilot, VS Code MCP, Chrome 147, GitHub Dependabot MCP, LangChain NVIDIA, LlamaIndex ACP, Semantic Invariance, Deep Thinking, MAR Reflexion, Qualcomm Wear, GitHub Enterprise 3.20, A2A v0.3, Karpathy Psychosis, OpenAI 8000 Hedefi, NVIDIA GTC Cosmos3). Bu konular bu rapora ta\u015f\u0131nmad\u0131.\n\n---\n\n## KAT-1 \u00b7 AI Laboratuvarlar\u0131 & Model Haberleri\n\n### OpenAI\n- **%17.5 PE Garantisi**: TPG, Advent, Blackstone, Permira hedefte. Y\u00fczlerce portf\u00f6y \u015firketine OpenAI ara\u00e7lar\u0131 da\u011f\u0131tma plan\u0131. Mevcut Claude Code enterprise \u00fcst\u00fcnl\u00fc\u011f\u00fcn\u00fc k\u0131rmak i\u00e7in. [The Decoder](https://the-decoder.com/)\n- **GPT-5.4 Frontend Prompting Rehberi**: Tasar\u0131mc\u0131lar i\u00e7in generik tasar\u0131mlardan ka\u00e7\u0131nmak ve daha iyi frontend sonu\u00e7lar\u0131 almak \u00fczerine yeni playbook. [The Decoder](https://the-decoder.com/)\n- **Superapp Plan\u0131**: ChatGPT + Codex + Atlas Browser tek desktop uygulamas\u0131nda birle\u015fecek. [The Decoder](https://the-decoder.com/openai-plans-to-merge-chatgpt-codex-and-atlas-browser-into-a-single-desktop-superapp/)\n\n### Meta AI\n- **Dreamer Acqui-hire**: Hugo Barra liderli\u011finde t\u00fcm ekip Meta Superintelligence Labs'a ge\u00e7ti. [The Decoder](https://the-decoder.com/)\n- **Zuckerberg'in Ki\u015fisel AI Agent'\u0131**: WSJ'ye g\u00f6re \u00e7al\u0131\u015fan katmanlar\u0131n\u0131 bypass ederek h\u0131zl\u0131 bilgi eri\u015fimi. \u015eirket genelinde herkese agent hedefi. [The Decoder](https://the-decoder.com/)\n\n### Karpathy\n- **\"Kendini Bottleneck Yapma\"**: Otonom agent GPT-2 training'ini geceleri optimize etti \u2014 insan\u0131n g\u00f6zden ka\u00e7\u0131rd\u0131\u011f\u0131 ince ayarlar\u0131 buldu. \"Remove yourself from the loop.\" [The Decoder](https://the-decoder.com/) / [HN](https://news.ycombinator.com/item?id=47493460)\n\n---\n\n## KAT-2 \u00b7 Agent & Framework\n\n- **DGM-Hyperagents** (arXiv 2603.19461, Facebook Research): Metacognitive self-modification \u2014 iyile\u015ftirme mekanizmas\u0131n\u0131n kendisi de evrimle\u015fiyor. Coding d\u0131\u015f\u0131 domain'lerde de \u00e7al\u0131\u015f\u0131yor. [arXiv](https://arxiv.org/abs/2603.19461)\n- **MiRA Framework** (arXiv 2603.19685): Subgoal decomposition + milestone RL. Gemma3-12B: 6.4%\u219243.0% WebArena SR. [arXiv](https://arxiv.org/abs/2603.19685)\n- **MiroThinker v1.0** (arXiv 2511.11793): 72B open-source research agent, 256K context, 600 tool call/g\u00f6rev. GAIA %81.9, HLE %37.7, BrowseComp %47.1. [HF Papers](https://huggingface.co/papers/2511.11793)\n- **bytedance/deer-flow** (GitHub Trending, 39K star, +3.569 bug\u00fcn): SuperAgent harness \u2014 ara\u015ft\u0131rma, kod, \u00fcretim. Sandbox + memory + subagent.\n- **czlonkowski/n8n-mcp** (16K star): Claude Code/Windsurf/Cursor i\u00e7in n8n workflow MCP.\n\n---\n\n## KAT-3 \u00b7 Makaleler & Ara\u015ft\u0131rma\n\n- **Attention Residuals / AttnRes** (arXiv 2603.15031, Kimi Team): Sabit residual ba\u011flant\u0131lar yerine softmax attention. PreNorm seyrelmesini \u00f6nl\u00fcyor. 1.4T token \u00fczerinde Kimi Linear 48B'de e\u011fitildi. [arXiv](https://arxiv.org/abs/2603.15031)\n- **\u03bb-RLM** (arXiv 2603.20105): \u03bb-calculus tabanl\u0131 uzun-context reasoning. 9 modelde 29/36 \u00fcst\u00fcn, +21.9 puan, 4.1x h\u0131z. [arXiv](https://arxiv.org/abs/2603.20105)\n- **HopChain** (arXiv 2603.17024): Multi-hop VLM reasoning i\u00e7in RLVR veri sentezi. Qwen3.5-35B/397B \u00fczerinde 24 benchmark. [arXiv](https://arxiv.org/abs/2603.17024)\n- **ProactiveBench** (arXiv 2603.19466): 22 MLLM'de proaktiflik testi. Modeller proaktif de\u011fil, model kapasitesi ile korelasyon yok, RL ile \u00f6\u011frenilebiliyor. [arXiv](https://arxiv.org/abs/2603.19466)\n- **DynaEdit** (arXiv 2603.17989): Training-free video d\u00fczenleme \u2014 aksiyon de\u011fi\u015ftirme, nesne ekleme, global efekt. Model-agnostic. [arXiv](https://arxiv.org/abs/2603.17989)\n\n---\n\n## KAT-4 \u00b7 D\u00fc\u015f\u00fcnce Liderleri\n\n- **Karpathy** \u2014 \"Researchers systematically automating themselves out of a job. Which is also their stated goal.\" Otonom agent'a geceleri kendi ara\u015ft\u0131rmas\u0131n\u0131 b\u0131rakma deneyi. [HN 199 puan](https://news.ycombinator.com/item?id=47493460)\n- **Simon Willison** (23 Mart): Starlette 1.0 + Claude skills denemesi. \"Beats\" \u00f6zelli\u011fine not ekleme. [simonwillison.net](https://simonwillison.net/)\n- **David Abram** (simonwillison.net \u00fczerinden): \"The machine didn't take your craft. You gave it up.\" \u2014 LLM'lerin \u00e7\u00f6zemeyece\u011fi \u015fey: sistem anlama, neyin var olmas\u0131 gerekti\u011fini bilmek. [davidabram.dev](https://www.davidabram.dev/musings/the-machine-didnt-take-your-craft/)\n\n---\n\n## KAT-5 \u00b7 Reddit Viral\n\n\u26a0\ufe0f KAT-5 Kaynak Hatas\u0131: Reddit 403-bot-block devam ediyor. HN fallback:\n- **Walmart: ChatGPT Checkout 3x K\u00f6t\u00fc D\u00f6n\u00fc\u015ft\u00fcrd\u00fc** \u2014 HN #20 (382 puan, 254 yorum). AI checkout deneyimi web sitesinden \u00e7ok geride. [searchengineland.com](https://searchengineland.com/walmart-chatgpt-checkout-converted-worse-472071)\n- **AI Risks \"Hypernormal\" Science** \u2014 HN #10 (43 puan): AI'n\u0131n bilimsel yay\u0131n kalitesini homojenle\u015ftirdi\u011fine dair analiz. [asimov.press](https://www.asimov.press/p/ai-science)\n\n---\n\n## KAT-6 \u00b7 Twitter/X Viral\n\n\u26a0\ufe0f KAT-6 Kaynak Hatas\u0131: Twitter/X javascript-block devam ediyor. HN fallback:\n- **iPhone 17 Pro 400B LLM Demo** (@anemll): HN #2, 406 puan, 220 yorum. On-device b\u00fcy\u00fck model inference demosu. [twitter.com/anemll](https://twitter.com/anemll/status/2035901335984611412)\n\n---\n\n## KAT-7 \u00b7 Platform & Ekosistem\n\n- **LocalStack GitHub Repo Ar\u015fivlendi** \u2014 HN #3 (108 puan, 52 yorum): Art\u0131k hesap gerektiriyor. Cloud yerel geli\u015ftirme ekosisteminde b\u00fcy\u00fck k\u0131r\u0131lma. [HN](https://news.ycombinator.com/item?id=47493657)\n- **Claude Code Ekosistemi B\u00fcy\u00fcyor**: `everything-claude-code` ve `awesome-claude-code` her ikisi GitHub Trending'de. [GitHub Trending](https://github.com/trending)\n- **kepano/obsidian-skills**: Obsidian i\u00e7in agent skills (Markdown, Bases, JSON Canvas, CLI). [GitHub](https://github.com/kepano/obsidian-skills)\n- **OpenAI Superapp**: ChatGPT + Codex + Atlas Browser birle\u015fiyor. [The Decoder](https://the-decoder.com/openai-plans-to-merge-chatgpt-codex-and-atlas-browser-into-a-single-desktop-superapp/)\n\n---\n\n## KAT-8 \u00b7 Robotik & Edge AI\n\n- **iPhone 17 Pro 400B LLM**: On-device inference demosu \u2014 cihazda b\u00fcy\u00fck model i\u00e7in yeni referans. [HN](https://news.ycombinator.com/item?id=47490070)\n- **Adaptive Transformer (The Decoder)**: Alman ekibi, modelin her sorun i\u00e7in kendi d\u00fc\u015f\u00fcnme s\u00fcresini belirledi\u011fi mimari geli\u015ftirdi. Bellek + hesaplama ayr\u0131m\u0131. [The Decoder](https://the-decoder.com/)\n\n---\n\n## KAT-9 \u00b7 OSS & \u00dcr\u00fcn Sinyalleri\n\n- **Trivy Supply Chain Sald\u0131r\u0131s\u0131** (socket.dev): 75/76 tag enfekte, v0.69.4/5/6, Docker Hub etkilendi, 10.000+ CI/CD pipeline risk. Mart'ta ikinci sald\u0131r\u0131. [socket.dev](https://socket.dev/blog/trivy-under-attack-again-github-actions-compromise)\n- **project-nomad** (13.232 star, +4.148 bug\u00fcn): Offline survival computer, TypeScript, kritik ara\u00e7lar + AI. [GitHub](https://github.com/Crosstalk-Solutions/project-nomad)\n- **MoneyPrinterV2** (22.709 star, +2.902 bug\u00fcn): Online para kazanmay\u0131 otomatize eden Python projesi trending. [GitHub](https://github.com/FujiwaraChoki/MoneyPrinterV2)\n- **Bombadil** (HN #19, 212 puan): Web UI'lar i\u00e7in property-based testing. [GitHub](https://github.com/antithesishq/bombadil)\n- **Autoresearch on eCLIP** (HN #1, 199 puan): Karpathy y\u00f6ntemini ger\u00e7ek ara\u015ft\u0131rmaya uygulamak \u2014 Claude Code konteynerize training loop'a b\u0131rak\u0131ld\u0131. [ykumar.me](https://ykumar.me/blog/eclip-autoresearch/)\n\n---\n\n## \ud83d\udcca Kaynak & Durum \u00d6zeti\n\n| Kategori | Kaynak | Durum | Madde |\n|----------|--------|-------|-------|\n| KAT-1 | The Decoder, Reuters | \u2705 | 4 |\n| KAT-2 | arXiv, GitHub Trending | \u2705 | 5 |\n| KAT-3 | HuggingFace, arXiv | \u2705 | 5 |\n| KAT-4 | The Decoder, simonwillison.net | \u2705 | 3 |\n| KAT-5 | Reddit | \u274c 403 \
