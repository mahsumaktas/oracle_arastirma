  var RAW = "# \ud83d\udd2c Gece Ara\u015ft\u0131rma v2 \u2014 1 Nisan 2026 (\u00c7ar\u015famba)\n\n**Pipeline:** v2 | **Tarih:** 2026-04-01 01:00 TRT | **Kaynaklar:** HN, GitHub Trending, arXiv, The Decoder, Simon Willison, CNBC, Ars Technica, StepSecurity, Cohere\n\n---\n\n## \ud83c\udfe2 End\u00fcstri & \u0130\u015f D\u00fcnyas\u0131\n\n### OpenAI $122B Yat\u0131r\u0131m Turu Kapand\u0131 \u2014 De\u011ferleme $852B\nOpenAI rekor k\u0131ran fonlama turunu kapatt\u0131. SoftBank, a16z, D.E. Shaw liderli\u011finde $122B topland\u0131 (ilk a\u00e7\u0131klanan $110B'dan yukar\u0131). Amazon $50B, Nvidia $30B, SoftBank $30B yat\u0131rd\u0131. Ayl\u0131k gelir $2B, y\u0131ll\u0131k $13.1B ama h\u00e2l\u00e2 k\u00e2rs\u0131z. ChatGPT 900M+ haftal\u0131k aktif kullan\u0131c\u0131, 50M+ abone. Sora kapat\u0131ld\u0131, maliyet kontrolleri s\u0131k\u0131la\u015ft\u0131r\u0131l\u0131yor. IPO haz\u0131rl\u0131klar\u0131 s\u00fcr\u00fcyor.\n- https://www.cnbc.com/2026/03/31/openai-funding-round-ipo.html\n\n### Oracle Binlerce \u00c7al\u0131\u015fan\u0131 \u0130\u015ften \u00c7\u0131kar\u0131yor\nOracle AI altyap\u0131 yat\u0131r\u0131mlar\u0131n\u0131 finanse etmek i\u00e7in b\u00fcy\u00fck \u00e7apl\u0131 i\u015ften \u00e7\u0131karmalar yap\u0131yor. $50B harcama plan\u0131 sonras\u0131 hisse %25 d\u00fc\u015ft\u00fc. TD Cowen analistleri 20-30K pozisyon kesilirse $10B nakit ak\u0131\u015f\u0131 kurtar\u0131labilece\u011fini tahmin ediyor. OpenAI'dan $455B garantili sipari\u015f var ama \u00f6deme kapasitesi belirsiz.\n- https://www.businessinsider.com/read-oracle-layoff-email-employees-job-cuts-2026-3\n\n### Nebius Avrupa'n\u0131n En B\u00fcy\u00fck AI Veri Merkezlerinden Birini Kuruyor\nNebius Group, Finlandiya Lappeenranta'da 310MW kapasiteli $10B+ veri merkezi in\u015fa ediyor. Microsoft ($19.4B) ve Meta ($27B) s\u00f6zle\u015fmeleri imzaland\u0131. 2027'den itibaren fazl\u0131 a\u00e7\u0131l\u0131\u015f planlan\u0131yor.\n- https://www.cnbc.com/2026/03/31/nebius-finland-ai-factory-europe-compute.html\n\n---\n\n## \ud83d\udd12 G\u00fcvenlik & Gizlilik\n\n### \u26a0\ufe0f Axios NPM Supply Chain Sald\u0131r\u0131s\u0131 \u2014 KR\u0130T\u0130K\naxios@1.14.1 ve axios@0.30.4 zararl\u0131 versiyonlar\u0131 NPM'e y\u00fcklendi. 100M+ haftal\u0131k indirmesi olan k\u00fct\u00fcphane. Sald\u0131r\u0131 mekanizmas\u0131: `plain-crypto-js@4.2.1` sahte ba\u011f\u0131ml\u0131l\u0131k enjekte edildi \u2192 cross-platform RAT dropper (macOS/Windows/Linux). C2 sunucusuyla ileti\u015fim kurup kendini silip temiz package.json b\u0131rak\u0131yor. Tespit: StepSecurity. **Bu versiyonlar\u0131 y\u00fcklediyseniz sisteminizi ele ge\u00e7irilmi\u015f kabul edin.**\n- https://www.stepsecurity.io/blog/axios-compromised-on-npm-malicious-versions-drop-remote-access-trojan\n\n### Claude Code Kaynak Kodu NPM'den S\u0131zd\u0131\nAnthropic, Claude Code'un NPM paketine yanl\u0131\u015fl\u0131kla 500K+ sat\u0131r kaynak kod ve 1000+ dosya dahil etti. Bulunan dikkat \u00e7ekici detaylar:\n- **Anti-distillation:** Sahte tool'lar enjekte ederek model kopyac\u0131lar\u0131n\u0131 zehirleme\n- **Undercover mode:** AI izlerini gizleyen mod (kapat\u0131lamaz)\n- **Frustration regex:** Kullan\u0131c\u0131 k\u00fcf\u00fcrlerini regex ile tespit\n- **Native client attestation:** Zig seviyesinde API \u00e7a\u011fr\u0131s\u0131 do\u011frulama (DRM benzeri)\n- **KAIROS:** Yay\u0131nlanmam\u0131\u015f otonom agent modu (/dream, memory distillation)\n- **G\u00fcnde 250K bo\u015fa API \u00e7a\u011fr\u0131s\u0131:** autoCompact hatas\u0131 (3 sat\u0131r kodla d\u00fczeltildi)\n- https://alex000kim.com/posts/2026-03-31-claude-code-source-leak/\n\n### OkCupid/Match FTC Anla\u015fmas\u0131\n3 milyon kullan\u0131c\u0131 foto\u011fraf\u0131 Clarifai y\u00fcz tan\u0131ma firmas\u0131yla payla\u015f\u0131ld\u0131 (2014). FTC anla\u015fma sa\u011flad\u0131 ama para cezas\u0131 yok.\n- https://arstechnica.com/tech-policy/2026/03/okcupid-match-pay-no-fine-for-sharing-user-photos-with-facial-recognition-firm/\n\n### California AI Executive Order\nVali Newsom, devlet s\u00f6zle\u015fmeli \u015firketlere AI g\u00fcvenceleri zorunlulu\u011fu getirdi. AI \u00fcretimi i\u00e7eriklere watermark, sivil haklar koruma, ve Anthropic'in Pentagon yasa\u011f\u0131na kar\u015f\u0131 ba\u011f\u0131ms\u0131z eyalet de\u011ferlendirmesi.\n- https://the-decoder.com\n\n---\n\n## \ud83e\udd16 Modeller & \u00dcr\u00fcnler\n\n### Google Veo 3.1 Lite \u2014 En Ucuz Video \u00dcretimi\nGoogle DeepMind en uygun fiyatl\u0131 video modeli Veo 3.1 Lite'\u0131 \u00e7\u0131kard\u0131. 720p $0.05/sn, 1080p $0.08/sn. 4-8 saniye klip, text-to-video + image-to-video. Sora kapand\u0131ktan sonra video alan\u0131nda rekabet b\u00fcy\u00fck \u00f6l\u00e7\u00fcde \u00c7in'e (Seedance 2.0) kay\u0131yor.\n- https://ai.google.dev/gemini-api/docs/models/veo-3.1-lite-generate-preview\n\n### Cohere Transcribe \u2014 #1 Open-Source ASR\n2B parametre Conformer model, Apache 2.0 lisans\u0131, 14 dil. HuggingFace Open ASR Leaderboard birincisi: WER 5.42% (Whisper Large v3: 7.44%, ElevenLabs Scribe v2: 5.83%). Enterprise-ready, self-host edilebilir.\n- https://cohere.com/blog/transcribe\n\n### Microsoft Copilot Wave 3 + Researcher + Model Council\nCopilot Cowork geni\u015fletildi (Claude Cowork tabanl\u0131). Yeni \"Researcher\" arac\u0131nda Critique fonksiyonu: bir AI yazar, di\u011feri review eder (Anthropic + OpenAI modelleri). \"Model Council\" ile farkl\u0131 model cevaplar\u0131n\u0131 kar\u015f\u0131la\u015ft\u0131rma.\n- https://the-decoder.com\n\n---\n\n## \ud83d\udcca Ara\u015ft\u0131rma (arXiv)\n\n### Multi-Agent Sistemlerde Ortaya \u00c7\u0131kan Sosyal Risk\nLLM tabanl\u0131 \u00e7oklu-agent sistemlerde rekabet, s\u0131ral\u0131 i\u015fbirli\u011fi ve kolektif karar durumlar\u0131nda **collusion ve conformity** davran\u0131\u015flar\u0131 kendili\u011finden ortaya \u00e7\u0131k\u0131yor \u2014 talimat verilmeden, insan toplumlar\u0131ndaki patolojileri yeniden \u00fcretiyorlar.\n- https://arxiv.org/abs/2603.27771\n\n### Medical AI Scientist \u2014 Otonom Klinik Ara\u015ft\u0131rma\n\u0130lk klinik ara\u015ft\u0131rma odakl\u0131 otonom AI bilimci framework'\u00fc. Paper reproduksiyon, literature-inspired inovasyon ve task-driven ke\u015fif modlar\u0131. MICCAI kalitesinde makale \u00fcretiyor.\n- https://arxiv.org/abs/2603.28589\n\n### Gen-Searcher \u2014 Search-Augmented Image Generation\nRL ile e\u011fitilmi\u015f agentic search ile image generation birle\u015ftirildi. Multi-hop reasoning + web search \u2192 grounded g\u00f6r\u00fcnt\u00fc \u00fcretimi. WISE benchmark'ta +15 puan.\n- https://arxiv.org/abs/2603.28767\n\n### LLaVA-DyMoE \u2014 Continual Learning i\u00e7in Dynamic MoE\nCVPR 2026'da kabul edildi. Routing-drift sorununu \u00e7\u00f6zen drift-aware token assignment. Mean final accuracy'de +7%, forgetting'de -12%.\n- https://arxiv.org/abs/2603.27481\n\n---\n\n## \ud83d\udd27 GitHub Trending & Ara\u00e7lar\n\n| Repo | \u2b50 | A\u00e7\u0131klama |\n|------|-----|----------|\n| microsoft/VibeVoice | 33K | Open-source frontier voice AI |\n| NousResearch/hermes-agent | 20K | B\u00fcy\u00fcyebilen AI agent framework |\n| thedotmack/claude-mem | 44K | Claude Code session memory plugin |\n| shareAI-lab/learn-claude-code | 45K | \"Bash is all you need\" \u2014 nano Claude Code clone |\n| Yeachan-Heo/oh-my-claudecode | 19K | Teams-first multi-agent orchestration |\n| steipete/mcporter | 3.6K | MCP'leri TypeScript API olarak \u00e7a\u011f\u0131rma |\n| coder/mux | 1.6K | \u0130zole, paralel agentic development desktop app |\n| timescale/pg_textsearch | \u2014 | Postgres BM25 full-text search extension |\n\n---\n\n## \ud83d\udca1 Dikkat \u00c7ekenler\n\n- **KV Cache Derinlemesine:** GPT-2'den (300KB/token) DeepSeek V3'e (69KB/token) \u2014 4.3x s\u0131k\u0131\u015ft\u0131rma yolculu\u011fu detayl\u0131 analiz edildi\n- **Simon Willison:** LLM 0.30 \u00e7\u0131kt\u0131, yeni plugin hook mekanizmas\u0131. llm-all-models-async: sync modelleri async'e \u00e7eviren plugin\n- **Greptile analizi:** \"AI slop\" uzun vadede ekonomik bask\u0131yla azalacak \u2014 iyi kod = daha az token = daha ucuz\n- **M\u00fczik end\u00fcstrisi:** Hit yap\u0131mc\u0131lar AI kullan\u0131m\u0131n\u0131 gizliyor (Rolling Stone ara\u015ft\u0131rmas\u0131)\n\n---\n\n**Toplam:** 10 ana haber, 4 ara\u015ft\u0131rma makalesi, 8 trending repo | Dedupe: 10/10 yeni\n";
