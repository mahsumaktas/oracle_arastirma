<!DOCTYPE html>

<head>

<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--fg:#111111;--link:#0066cc;--link-hover:#004499;
  --border:#dee2e6;--code-bg:#f4f4f4;--blockquote-bg:#f8f9fa;
  --table-head:#f0f0f0;--table-stripe:#fafafa;
  --accent:#2563eb;--warn:#f59e0b;--ok:#16a34a;--danger:#dc2626;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:"SFMono-Regular",Menlo,Monaco,Consolas,"Liberation Mono",monospace;
  --radius:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0d1117;--fg:#e6edf3;--link:#58a6ff;--link-hover:#79b8ff;
    --border:#30363d;--code-bg:#161b22;--blockquote-bg:#161b22;
    --table-head:#161b22;--table-stripe:#161b22;
    --accent:#58a6ff;
  }
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--font-sans);font-size:16px;line-height:1.7;
  -webkit-text-size-adjust:100%;
}

/* ── Layout ── */
.page-wrap{max-width:860px;margin:0 auto;padding:0 16px 80px}
header{
  background:var(--accent);color:#fff;
  padding:18px 16px 14px;
  border-radius:0 0 var(--radius) var(--radius);
  margin-bottom:28px;
}
header h1{font-size:clamp(1.1rem,4vw,1.5rem);font-weight:700;line-height:1.3}
header .meta{font-size:.85rem;opacity:.85;margin-top:6px}
header .meta a{color:#cfe2ff;text-decoration:none}
header .meta a:hover{text-decoration:underline}

nav.breadcrumb{font-size:.85rem;margin-bottom:20px;color:var(--link)}
nav.breadcrumb a{color:var(--link);text-decoration:none}
nav.breadcrumb a:hover{text-decoration:underline}
nav.breadcrumb span{color:var(--fg);opacity:.6;margin:0 6px}

/* ── Markdown content ── */
#content h1{font-size:clamp(1.3rem,5vw,1.8rem);margin:32px 0 12px;line-height:1.3}
#content h2{font-size:clamp(1.1rem,4vw,1.4rem);margin:28px 0 10px;border-bottom:2px solid var(--border);padding-bottom:6px}
#content h3{font-size:clamp(1rem,3.5vw,1.2rem);margin:22px 0 8px}
#content p{margin:10px 0}
#content a{color:var(--link);word-break:break-word}
#content a:hover{color:var(--link-hover)}
#content strong{font-weight:700}
#content em{font-style:italic}
#content hr{border:none;border-top:2px solid var(--border);margin:28px 0}

/* ── Lists ── */
#content ul,#content ol{margin:10px 0 10px 1.4em}
#content li{margin:4px 0}

/* ── Blockquotes ── */
#content blockquote{
  background:var(--blockquote-bg);
  border-left:4px solid var(--accent);
  margin:14px 0;padding:10px 16px;
  border-radius:0 var(--radius) var(--radius) 0;
}
#content blockquote p{margin:4px 0}

/* ── Code ── */
#content code{
  background:var(--code-bg);color:var(--fg);
  border-radius:4px;padding:2px 6px;
  font-family:var(--font-mono);font-size:.88em;
  word-break:break-all;
}
#content pre{
  background:var(--code-bg);border-radius:var(--radius);
  padding:14px 16px;overflow-x:auto;margin:14px 0;
}
#content pre code{
  background:none;padding:0;border-radius:0;
  font-size:.85em;word-break:normal;
}

/* ── Tables — responsive wrap ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:14px 0}
#content table{
  border-collapse:collapse;width:100%;min-width:340px;
  font-size:.9em;
}
#content th{
  background:var(--table-head);
  text-align:left;padding:8px 12px;
  border:1px solid var(--border);font-weight:600;
}
#content td{
  padding:7px 12px;border:1px solid var(--border);
  vertical-align:top;word-break:break-word;
}
#content tr:nth-child(even) td{background:var(--table-stripe)}

/* ── Emoji badges in text ── */
.badge{
  display:inline-block;padding:1px 7px;border-radius:99px;
  font-size:.78rem;font-weight:600;line-height:1.6;
}

/* ── Back to top ── */
#back-top{
  position:fixed;bottom:20px;right:16px;
  background:var(--accent);color:#fff;
  border:none;border-radius:50%;width:44px;height:44px;
  font-size:1.3rem;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;
}
#back-top:hover{opacity:.85}

/* ── Loading state ── */
#loading{text-align:center;padding:60px 0;color:var(--fg);opacity:.5;font-size:1.1rem}
</style>
</head>
<body>
<header>
  <div class="page-wrap">

    </div>
  </div>
</header>

<div class="page-wrap">
  <nav class="breadcrumb">
    <a href="https://mahsumaktas.github.io/oracle_arastirma/index.html">Oracle Araştırma</a>
    <span>/</span>
    2026-03-22

</div>

<!-- marked.js — lightweight CDN markdown parser (no server needed) -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
(function(){
  // ── Raw markdown (HTML-escaped by publisher, decoded here) ──
  var RAW = "Rapor tamamlandi. Dosya: `research/nightly-v2/reports/2026-03-22-nightly-v2.md`\n\n**Top 7 Ozet:**\n\n1. **Karpathy \"psikoza girdim\"** -- Aralik'tan beri kod yazmamis, %80 agent/%20 insan. autoresearch 26K star.\n2. **Hackerbot-Claw** -- Otonom AI agent 7 gunde 7 OSS repo hack'ledi (Trivy dahil). Claude Code saldiriyi reddetti -- ilk AI-on-AI savasi.\n3. **A2A Protocol v1.0** -- Production-ready. gRPC + JSON-RPC, Signed Agent Cards, multi-tenancy.\n4. **MetaClaw** -- Deploy sonrasi kendini adapte eden continual meta-learning agent. 2,260 HF upvote.\n5. **Google baslik degistirme** -- Google Search AI ile makale basliklarini sessizce yeniden yaziyor.\n6. **NVIDIA IGX Thor GA + Cosmos 3** -- Blackwell edge AI (8x performans) + world foundation model.\n7. **Project Nomad** -- Offline survival bilgisayar, tek gunde +2,054 star.\n\n**Oracle icin kritik sinyal:** Hackerbot-Claw'in README injection saldirisi (%84-91 basari) -- hookify'a \"README injection detection\" kurali eklenmeli.\n";

  // ── marked config ──
  marked.setOptions({
    gfm:true,
    breaks:false,
    mangle:false,
    headerIds:false
  });

  // ── Wrap tables for horizontal scroll ──
  var renderer = new marked.Renderer();
  renderer.table = function(header, body){
    return '<div class="table-wrap"><table><thead>' + header + '</thead><tbody>' + body + '</tbody></table></div>';
  };

  var html = marked.parse(RAW, {renderer:renderer});
  var content = document.getElementById('content');
  var loading = document.getElementById('loading');
  content.innerHTML = html;
  content.style.display = '';
  loading.style.display = 'none';

  // ── Open external links in new tab ──
  var links = content.querySelectorAll('a[href]');
  for(var i=0;i<links.length;i++){
    var href = links[i].getAttribute('href');
    if(href && (href.startsWith('http://') || href.startsWith('https://'))){
      links[i].setAttribute('target','_blank');
      links[i].setAttribute('rel','noopener noreferrer');
    }
  }
})();
</script>
</body>
