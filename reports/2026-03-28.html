  var RAW = "# \ud83d\udd2c Gece Ara\u015ft\u0131rma \u2014 2026-03-28 (Cumartesi 01:00 \u0130ST)\n\n> **Yenilik \u00d6nceli\u011fi** \u00b7 8/9 kategori \u00b7 Web kaynaklar aktif (Perplexity kota d\u0131\u015f\u0131) \u00b7 Dedupe: 9 madde elendi\n\n> \u26a0\ufe0f NOT: oracle-bridge --research zaman a\u015f\u0131m\u0131na u\u011frad\u0131; rapor web_fetch + do\u011frudan kaynak analizi ile \u00fcretildi. Perplexity API kota t\u00fcketilmi\u015f.\n\n---\n\n## \ud83d\udd25 Top 7 \u2014 Sadece GER\u00c7EKTEN YEN\u0130 (Son 72 Saat Delta)\n\n> 72 saatlik dedupe uyguland\u0131. Gemini 3, Mistral Voxtral, A2A v0.3, Figure F.03, Cursor Agents, CUA-Suite, T-MAP \u2014 d\u00fcn raporland\u0131, elendi.\n\n| # | Madde | Kategori | Kaynak | \u00d6nem |\n|---|-------|----------|--------|------|\n| 1 | **GitHub \u2192 Nisan 24'e kadar opt-out: \u00d6zel repo'lar AI e\u011fitiminde** \u2014 GitHub, ayarlardan devre d\u0131\u015f\u0131 b\u0131rak\u0131lmazsa \u00f6zel repo'lar\u0131 model e\u011fitiminde kullanmaya ba\u015fl\u0131yor. Opt-out linki: github.com/settings/copilot. HN'de #1 (363 puan, 182 yorum). [\ud83d\udd17 HN](https://news.ycombinator.com/item?id=47548243) | KAT-7 | HN Canl\u0131 | \ud83d\udd34 |\n| 2 | **Claude.com Web Scheduled Tasks** \u2014 Anthropic, claude.com'a do\u011frudan zamanl\u0131 g\u00f6rev \u00e7al\u0131\u015ft\u0131rma ekledi. Kod \u00e7al\u0131\u015ft\u0131rma, web eri\u015fimi, dosya y\u00f6netimi \u2014 taray\u0131c\u0131dan cron benzeri otomasyon. HN 279 puan, 226 yorum. [\ud83d\udd17 Claude Docs](https://code.claude.com/docs/en/web-scheduled-tasks) \u00b7 [\ud83d\udd17 HN](https://news.ycombinator.com/item?id=47539188) | KAT-1 | HN / Anthropic | \ud83d\udd34 |\n| 3 | **Microsoft \u00e7al\u0131\u015fanlar\u0131 zorunlu hesap \u015fart\u0131na kar\u015f\u0131** \u2014 Windows 11 kurulumunda Microsoft hesab\u0131 zorunlulu\u011fu i\u00e7in \u015firket i\u00e7i muhalefet. Kurumsal bask\u0131 birikiyor. HN #1 (430 puan, 355 yorum). [\ud83d\udd17 WindowsCentral](https://www.windowscentral.com/microsoft/windows-11/people-inside-microsoft-are-fighting-to-drop-windows-11s-mandatory-microsoft-account-requirements-during-setup) \u00b7 [\ud83d\udd17 HN](https://news.ycombinator.com/item?id=47542695) | KAT-7 | WindowsCentral | \ud83d\udfe1 |\n| 4 | **last30days-skill GitHub Trending #1 \u2014 2.824 y\u0131ld\u0131z bug\u00fcn** \u2014 Herhangi bir konuyu Reddit, X, YouTube, HN, Polymarket ve web'den ara\u015ft\u0131r\u0131p sentezleyen a\u00e7\u0131k kaynak agent skill. OpenClaw/Clawdbot skill ekosistemiyle do\u011frudan \u00f6rt\u00fc\u015f\u00fcyor. [\ud83d\udd17 GitHub](https://github.com/mvanhorn/last30days-skill) | KAT-2 | GitHub Trending | \ud83d\udfe1 |\n| 5 | **Telnyx Python SDK PyPI zinciri zehirlendi** \u2014 Telnyx resmi Python paketi k\u00f6t\u00fc ama\u00e7l\u0131 kod i\u00e7eriyordu (HN 62 puan, 71 yorum). Mart 2026'n\u0131n 2. b\u00fcy\u00fck PyPI supply chain sald\u0131r\u0131s\u0131 (LiteLLM'den sonra). [\ud83d\udd17 Telnyx Blog](https://telnyx.com/resources/telnyx-python-sdk-supply-chain-security-notice-march-2026) \u00b7 [\ud83d\udd17 HN](https://news.ycombinator.com/item?id=47540388) | KAT-9 | HN / Telnyx | \ud83d\udfe1 |\n| 6 | **simonw: LiteLLM k\u00f6t\u00fc ama\u00e7l\u0131 kod + Claude analizi transcript** \u2014 Simon Willison, LiteLLM sald\u0131r\u0131s\u0131n\u0131 Claude ile analiz eden konu\u015fma kay\u0131tlar\u0131n\u0131 payla\u015ft\u0131. Claude, Docker container'da kodu do\u011frulay\u0131p PyPI g\u00fcvenlik ileti\u015fim adresini de buldu. [\ud83d\udd17 FutureSearch](https://futuresearch.ai/blog/litellm-attack-transcript/) \u00b7 [\ud83d\udd17 simonwillison.net](https://simonwillison.net/2026/Mar/26/) | KAT-4 | simonwillison.net | \ud83d\udfe1 |\n| 7 | **Anatomy of the .claude/ folder \u2014 viral e\u011fitim i\u00e7eri\u011fi** \u2014 .claude/ yap\u0131s\u0131n\u0131 anlatan makale HN'de 321 puan, 164 yorum. CLAUDE.md, hooks, permissions, custom commands \u2014 t\u00fcm Claude Code kullan\u0131c\u0131lar\u0131 i\u00e7in kritik referans. [\ud83d\udd17 DailyDoseOfDS](https://blog.dailydoseofds.com/p/anatomy-of-the-claude-folder) \u00b7 [\ud83d\udd17 HN](https://news.ycombinator.com/item?id=47543139) | KAT-9 | HN / DailyDoseOfDS | \ud83d\udfe2 |\n\n**Dedupe notu:** Elenen 9 madde (72h aktif): Gemini 3 (28h), Mistral Voxtral (28h), A2A v0.3 (28h), Figure F.03 (48h), Cursor Cloud Agents (28h), CUA-Suite (28h), T-MAP (28h), deer-flow (28h), ARC-AGI-3 (72h)\n\n---\n\n## \ud83e\udd16 KAT-1 \u00b7 AI Laboratuvarlar\u0131 & Model Haberleri\n\n**Claude Web Scheduled Tasks (27 Mart)** \u2014 Anthropic, claude.com'a zamanl\u0131 otomasyon ekledi. Kullan\u0131c\u0131lar kod \u00e7al\u0131\u015ft\u0131rma, web eri\u015fimi ve dosya y\u00f6netimi g\u00f6revlerini periyodik olarak \u00e7al\u0131\u015ft\u0131rabiliyor. API gerektirmiyor. [\ud83d\udd17 Claude Docs](https://code.claude.com/docs/en/web-scheduled-tasks)\n\n**D\u00fcn raporlanan / ba\u011flam:** Google Gemini 3 Pro, Mistral Voxtral TTS, Anthropic Claude Code Auto Mode \u2014 d\u00fcn detayl\u0131 raporland\u0131. Yeni geli\u015fme yok.\n\n---\n\n## \ud83d\udd78\ufe0f KAT-2 \u00b7 Agent & Framework\n\n**last30days-skill (GitHub Trending #1)** \u2014 Herhangi bir konuyu son 30 g\u00fcnde Reddit, X, YouTube, HN, Polymarket ve genel web'den ara\u015ft\u0131r\u0131p sentezleyen agent skill. Bug\u00fcn 2.824 y\u0131ld\u0131z, toplam 12.488. OpenClaw skill mimarisiyle %100 paralel. [\ud83d\udd17 GitHub](https://github.com/mvanhorn/last30days-skill)\n\n**AI-Scientist-v2 (SakanaAI, Trending #3)** \u2014 Workshop d\u00fczeyinde otomatik bilimsel ke\u015fif; agentic tree search ile hipotez \u2192 deney \u2192 makale d\u00f6ng\u00fcs\u00fc. 2.822 y\u0131ld\u0131z, 125 bug\u00fcn. [\ud83d\udd17 GitHub](https://github.com/SakanaAI/AI-Scientist-v2)\n\n**deer-flow (Trending #7, devam)** \u2014 ByteDance SuperAgent, 2.126 y\u0131ld\u0131z bug\u00fcn, toplam 50.068. D\u00fcnden beri trending devam ediyor. Yeni geli\u015fme yok.\n\n---\n\n## \ud83d\udcc4 KAT-3 \u00b7 Makaleler & Ara\u015ft\u0131rma\n\n| arXiv ID | Ba\u015fl\u0131k | Neden \u00d6nemli | Kaynak |\n|----------|--------|--------------|--------|\n| 2603.25744 | MuRF: Vision Foundation Models i\u00e7in Multi-Scale F\u00fczyon | DINOv2, SigLIP2'yi training olmadan \u00e7ok-\u00f6l\u00e7ekli \u00e7al\u0131\u015ft\u0131r\u0131yor. G\u00f6r\u00fcnt\u00fc anlama kalitesi art\u0131yor. | [HuggingFace Papers](https://huggingface.co/papers) |\n| 2603.14366 | PixelREPA: Piksel-uzay\u0131 diffusion transformer i\u00e7in representation alignment | JiT modellerinde FID 3.66\u21923.17, 2x h\u0131zl\u0131 e\u011fitim | [HuggingFace Papers](https://huggingface.co/papers) |\n\n**Oracle i\u00e7in \u00e7\u0131kar\u0131m:** Vision foundation model multi-scale \u00e7\u0131kar\u0131m\u0131, Peekaboo/ekran analizi pipeline'\u0131na d\u00fc\u015f\u00fck eforla entegre edilebilir.\n\n---\n\n## \ud83e\udde0 KAT-4 \u00b7 D\u00fc\u015f\u00fcnce Liderleri\n\n| Ki\u015fi | G\u00f6r\u00fc\u015f \u00d6zeti | Tarih | Kaynak |\n|------|-------------|-------|--------|\n| @simonw | M5 MacBook Pro'da SwiftUI uygulamas\u0131 vibe-coding; Activity Monitor yerine kendi izleme arac\u0131n\u0131 LLM ile yazd\u0131 | 27 Mart | [simonwillison.net](https://simonwillison.net/2026/Mar/27/vibe-coding-swiftui/) |\n| @simonw | LiteLLM malware analizini Claude transcript ile belgeledi: Docker'da kodu do\u011frulama, PyPI g\u00fcvenlik raporlama adresini Claude \u00f6nerdi | 26 Mart | [FutureSearch Blog](https://futuresearch.ai/blog/litellm-attack-transcript/) |\n| Richard Fontana (LGPLv3 yazar\u0131) | chardet 7.0.0 relicensing tart\u0131\u015fmas\u0131nda: mevcut durumda LGPL ihlali kan\u0131t\u0131 g\u00f6remiyorum | 27 Mart | [simonwillison.net](https://simonwillison.net/2026/Mar/27/richard-fontana/) |\n\n---\n\n## \ud83d\udd34 KAT-5 \u00b7 Reddit Viral\n\n\u26a0\ufe0f Kaynak Hatas\u0131: Reddit 403-bot-block devam ediyor. D\u00fcn rapor edilen durum ge\u0
