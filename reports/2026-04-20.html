rce ve outbound automation i\u00e7in kimlik primitive\u2019i olabilir. Kaynak: [Computerworld](https://www.computerworld.com/article/4160511/world-id-expands-its-proof-of-human-vision-for-the-ai-era.html), [World](https://world.org/id-id/blog/announcements/zoom-docusign-world-id-for-business)\n- **Claude Code tasar\u0131m alan\u0131:** `Dive into Claude Code` makalesi, permission modes, compaction pipeline, MCP/plugins/skills/hooks ve subagent delegation gibi mimari kararlar\u0131 kaynak kod \u00fczerinden analiz ediyor. Kaynak: [HF/arXiv 2604.14228](https://huggingface.co/papers/2604.14228)\n- **MCP governance:** MCP maintainer ekibi geni\u015fledi; bu delta eski ama protokol\u00fcn Linux Foundation/AAIF sonras\u0131 kurumsalla\u015fmas\u0131n\u0131n s\u00fcrd\u00fc\u011f\u00fcn\u00fc g\u00f6steriyor. Kaynak: [MCP Blog](https://blog.modelcontextprotocol.io/)\n- **Dedupe:** MCP supply-chain/RCE alarm\u0131 bu raporda tekrar \u00f6ne \u00e7\u0131kar\u0131lmad\u0131; 72 saat listesinde daha \u00f6nce vard\u0131.\n\n---\n\n## \ud83d\udcc4 KAT-3 \u00b7 Makaleler & Ara\u015ft\u0131rma\n\n| arXiv ID | Ba\u015fl\u0131k | Neden \u00d6nemli | Kaynak |\n|----------|--------|--------------|--------|\n| 2604.14683 | DR\u00b3-Eval: Towards Realistic and Reproducible Deep Research Evaluation | Deep research agent\u2019lar\u0131 citation coverage, factual accuracy ve depth quality ile \u00f6l\u00e7\u00fcyor. | [HF](https://huggingface.co/papers/2604.14683) |\n| 2604.14268 | HY-World 2.0 | A\u00e7\u0131k kaynak multimodal 3D world model; sim\u00fclasyon/embodied veri \u00fcretimi i\u00e7in kritik. | [HF](https://huggingface.co/papers/2604.14268) |\n| 2604.15308 | RAD-2 | Autonomous driving motion planning i\u00e7in diffusion generator + RL discriminator mimarisi. | [HF](https://huggingface.co/papers/2604.15308) |\n| 2604.14125 | HiVLA | VLM semantic planner ile low-level robot control\u2019\u00fc ayr\u0131\u015ft\u0131r\u0131yor. | [HF](https://huggingface.co/papers/2604.14125) |\n
