  var RAW = "# \ud83d\udd2c Gece Ara\u015ft\u0131rma \u2014 2026-04-17 (Cuma 01:00 \u0130ST)\n\n> **Yenilik \u00d6nceli\u011fi** \u00b7 9/9 kategori \u00b7 19 kaynak aktif \u00b7 Dedupe: 6 madde elendi\n\n\u26a0\ufe0f KAT-5, KAT-6 ve KAT-9\u2019un baz\u0131 alt-sinyalleri eri\u015filebilir web sonu\u00e7lar\u0131nda k\u0131smi kald\u0131. E\u015fik-alt\u0131 veya metrik/do\u011frulama sorunu olanlar\u0131 Top 7\u2019ye almad\u0131m.\n\n---\n\n## \ud83d\udd25 Top 7 \u2014 Sadece GER\u00c7EKTEN YEN\u0130 (Son 72 Saat Delta)\n\n> Bu b\u00f6l\u00fcme yaln\u0131zca 72 saat i\u00e7inde ilk kez raporlanan veya materyal olarak de\u011fi\u015fen maddeler girer.\n> Daha \u00f6nce raporlanan konunun devam\u0131 \u2192 \"\u2192 G\u00fcncelleme:\" etiketiyle altta g\u00f6ster.\n\n| # | Madde | Kategori | Kaynak | \u00d6nem |\n|---|-------|----------|--------|------|\n| 1 | **Gemini 3.1 Flash TTS preview\u2019a a\u00e7\u0131ld\u0131** \u2014 Google, 15 Nisan\u2019da yeni TTS modelini 70+ dil, audio tags ve SynthID watermark ile AI Studio / Vertex AI / Google Vids hatt\u0131na a\u00e7t\u0131. [\ud83d\udd17](https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-1-flash-tts/) | KAT-1 | [Google Blog](https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-1-flash-tts/), [DeepMind News](https://deepmind.google/blog/) | \ud83d\udd34 |\n| 2 | **Gemini Robotics-ER 1.6 geldi** \u2014 14 Nisan tarihli s\u00fcr\u00fcm, embodied reasoning\u2019i \u00e7oklu kamera, success detection ve end\u00fcstriyel gauge/instrument reading ile ciddi bi\u00e7imde ileri itti; API ve AI Studio\u2019dan a\u00e7\u0131ld\u0131. [\ud83d\udd17](https://deepmind.google/blog/gemini-robotics-er-1-6/) | KAT-8 | [Google DeepMind](https://deepmind.google/blog/gemini-robotics-er-1-6/) | \ud83d\udd34 |\n| 3 | **MCP ekosisteminde supply-chain alarm\u0131 b\u00fcy\u00fcd\u00fc** \u2014 OX Security, 15 Nisan\u2019da Anthropic modelcontextprotocol STDIO hatt\u0131 etraf\u0131nda 30+ disclosure ve 10+ CVE\u2019ye ba\u011flanan sistemik command-exec zincirini teknik olarak yay\u0131mlad\u0131. [\ud83d\udd17](https://www.ox.security/blog/the-mother-of-all-ai-supply-chains-technical-deep-dive/) | KAT-2 | [OX Security](https://www.ox.security/blog/the-mother-of-all-ai-supply-chains-technical-deep-dive/), [ITPro](https://www.itpro.com/security/ai-agents-using-anthropic-mcp-supply-chain-attacks-claim-researchers) | \ud83d\udd34 |\n| 4 | **OccuBench yay\u0131mland\u0131** \u2014 100 profesyonel alan\u0131 language world models ile sim\u00fcle eden benchmark, agent performans\u0131n\u0131 i\u015f-d\u00fcnyas\u0131 g\u00f6revlerine ta\u015f\u0131maya \u00e7al\u0131\u015f\u0131yor; frontier model kar\u015f\u0131la\u015ft\u0131rmas\u0131 i\u00e7in daha ger\u00e7ek\u00e7i bir \u00e7er\u00e7eve sunuyor. [\ud83d\udd17](https://huggingface.co/papers/2604.10866) | KAT-3 | [HF Paper](https://huggingface.co/papers/2604.10866) | \ud83d\udd34 |\n| 5 | **Memory Transfer Learning, coding agent memory\u2019sini domain d\u0131\u015f\u0131na ta\u015f\u0131d\u0131** \u2014 15 Nisan tarihli \u00e7al\u0131\u015fma, ham trace yerine y\u00fcksek seviyeli i\u00e7g\u00f6r\u00fclerin cross-domain transferde daha i\u015fe yarad\u0131\u011f\u0131n\u0131 g\u00f6steriyor. [\ud83d\udd17](https://huggingface.co/papers/2604.14004) | KAT-3 | [HF Paper](https://huggingface.co/papers/2604.14004) | \ud83d\udd34 |\n| 6 | **Explore/exploit hatalar\u0131 \u00f6l\u00e7\u00fclebilir hale geldi** \u2014 Yeni benchmark, LM agent\u2019larda exploration error\u2019un ba\u015far\u0131y\u0131 \u00e7ok g\u00fc\u00e7l\u00fc a\u00e7\u0131klad\u0131\u011f\u0131n\u0131 ve k\u00fc\u00e7\u00fck harness iyile\u015ftirmelerinin b\u00fcy\u00fck etki verdi\u011fini g\u00f6steriyor. [\ud83d\udd17](https://huggingface.co/papers/2604.13151) | KAT-3 | [HF Paper](https://huggingface.co/papers/2604.13151) | \ud83d\udd34 |\n| 7 | **TREX, LLM fine-tuning lifecycle\u2019\u0131n\u0131 agentify etmeye oynuyor** \u2014 Researcher + Executor ayr\u0131m\u0131 ve a\u011fa\u00e7 tabanl\u0131 deney planlamas\u0131yla fine-tuning\u2019i u\u00e7tan uca otomasyona yakla\u015ft\u0131r\u0131yor. [\ud83d\udd17](https://huggingface.co/papers/2604.14116) | KAT-3 | [HF Paper](https://huggingface.co/papers/2604.14116) | \ud83d\udfe1 |\n\n**Dedupe notu:** Elenen ba\u015fl\u0131ca tekrarlar: GPT-5.4-Cyber, Apple beta sweep, Touch Dreaming, OpenAI commerce policies, Microsoft Agent Framework 1.0 / skill authoring, \u201cMCP governance-scale\u201d hatt\u0131.\n\n---\n\n## \ud83e\udd16 KAT-1 \u00b7 AI Laboratuvarlar\u0131 & Model Haberleri\n\n- **Google DeepMind: Gemini 3.1 Flash TTS** \u2014 15 Nisan\u2019da preview a\u00e7\u0131ld\u0131; do\u011fal konu\u015fma, audio tags ile ince ton kontrol\u00fc, 70+ dil ve SynthID watermark getiriyor. [Google Blog](https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-1-flash-tts/) \u00b7 [DeepMind News](https://deepmind.google/blog/)\n- **Anthropic taraf\u0131nda taze public model delta zay\u0131f** \u2014 eri\u015filebilir resmi newsroom\u2019da son taze sinyal model de\u011fil; 14 Nisan\u2019da Long-Term Benefit Trust board atamas\u0131 \u00f6ne \u00e7\u0131k\u0131yor. Bu y\u00fczden Anthropic\u2019i Top 7\u2019ye ta\u015f\u0131mad\u0131m. [Anthropic Newsroom](https://www.anthropic.com/news)\n- **OpenAI taraf\u0131nda son g\u00fcncel Help/Release y\u00fczeyi daha \u00e7ok \u00fcr\u00fcn-operasyon g\u00fcncellemesi veriyor** \u2014 yeni bir public frontier model post\u2019u de\u011fil; 9 Nisan release notes ve daha eski GPT-4o/legacy retirements \u00f6ne \u00e7\u0131k\u0131yor. [ChatGPT Release Notes](https://help.openai.com/en/articles/6825453-chatgpt-release-notes?trk=public_post-text) \u00b7 [Model Notes](https://help.openai.com/en/articles/9624314-model-release-notes?_bhlid=3108fd4217ec87e158a70a9bfcae9090fc704157)\n\n---\n\n## \ud83d\udd78\ufe0f KAT-2 \u00b7 Agent & Framework\n\n- **MCP supply-chain riski art\u0131k \u201cteorik\u201d de\u011fil** \u2014 OX\u2019in 15 Nisan deep dive\u2019\u0131, baz\u0131 MCP kurulumlar\u0131nda config-to-command-execution zincirinin ger\u00e7ek disclosure/CVE \u00e7\u0131kt\u0131s\u0131 verdi\u011fini g\u00f6steriyor. [OX Security](https://www.ox.security/blog/the-mother-of-all-ai-supply-chains-technical-deep-dive/) \u00b7 [ITPro](https://www.itpro.com/security/ai-agents-using-anthropic-mcp-supply-chain-attacks-claim-researchers)\n- **AutoGen ekosisteminde rota netle\u015fiyor** \u2014 Microsoft\u2019un `autogen` reposu art\u0131k yeni kullan\u0131c\u0131lar\u0131 do\u011frudan Microsoft Agent Framework\u2019e y\u00f6nlendiriyor; AutoGen bak\u0131m/patch modunda konumlan\u0131yor. [AutoGen GitHub](https://github.com/microsoft/autogen)\n- **MCP kurumsalla\u015fmas\u0131 s\u00fcr\u00fcyor ama bu tur delta de\u011fil** \u2014 resmi MCP blog ar\u015fivinde en yak\u0131n y\u00f6neti\u015fim sinyali 8 Nisan\u2019daki maintainer team geni\u015flemesi; dedupe nedeniyle Top 7\u2019ye girmedi. [MCP Blog Archives](https://blog.modelcontextprotocol.io/archives/)\n\n---\n\n## \ud83d\udcc4 KAT-3 \u00b7 Makaleler & Ara\u015ft\u0131rma\n\n| arXiv ID | Ba\u015fl\u0131k | Neden \u00d6nemli | Kaynak |\n|----------|--------|--------------|--------|\n| 2604.10866 | OccuBench | Agent benchmark\u2019\u0131n\u0131 web/coding d\u0131\u015f\u0131na ta\u015f\u0131y\u0131p 100 i\u015f alan\u0131na yaymaya \u00e7al\u0131\u015f\u0131yor; \u201cprofessional tasks\u201d \u00f6l\u00e7\u00fcm\u00fc i\u00e7in yeni \u00e7\u0131ta. | [HF](https://huggingface.co/papers/2604.10866) |\n| 2604.14004 | Memory Transfer Learning | Coding agent memory\u2019sinde soyut i\u00e7g\u00f6r\u00fclerin ham trace\u2019lerden daha iyi transfer verdi\u011fini g\u00f6steriyor; memory design i\u00e7in do\u011frudan pratik sonu\u00e7. | [HF](https://huggingface.co/papers/2604.14004) |\n| 2604.13151 | Exploration and Exploitation Errors Are Measurable for Language Model Agents | Agent ba\u015far\u0131s\u0131zl\u0131\u011f\u0131n\u0131 \u201cneden\u201d baz\u0131nda ay\u0131r\u0131yor; \u00f6zellikle exploration error\u2019un kritik oldu\u011funu \u00f6l\u00e7\u00fclebilir hale getiriyor. | [HF](https://huggingface.co/papers/2604.13151) |\n| 2604.14116 | TREX | Fine-tuning lifecycle\u2019\u0131n\u0131 multi-agent research/execution a\u011fac\u0131na \u00e7eviriyor; agentic ML ops i\u00e7in ilgin\u00e7. | [HF](https://huggingface.co/papers/2604.14116) |\n| 2604.11251 | CLAW | Humanoid i\u00e7in dil etiketli whole-body motion datas\u0131n\u0131 daha \u00f6l\u00e7ekli \u00fcretmeye oynuyor; embodied data bottleneck\u2019ine pratik cevap. | [arXiv](https://arxiv.org/abs/2604.11251) |\n\n**Oracle i\u00e7in \u00e7\u0131kar\u0131m:** Hachi/Oracle hatt\u0131nda \u201cham ge\u00e7mi\u015fi sakla\u201d yerine \u201cy\u00fcksek seviyeli abstraction memory\u201d, \u201charness engineering\u201d, ve \u201c\u00f6l\u00e7\u00fclebilir failure taxonomy\u201d \u00fc\u00e7l\u00fcs\u00fc daha de\u011ferli g\u00f6r\u00fcn\u00fcyor.\n\n---\n\n## \ud83e\udde0 KAT-4 \u00b7 D\u00fc\u015f\u00fcnce Liderleri\n\n\u26a0\ufe0f Son 48 saatte hedef listedeki t\u00fcm isimler i\u00e7in do\u011frudan, birincil sosyal payla\u015f\u0131m do\u011frulamas\u0131 temiz \u00e7\u0131kmad\u0131. A\u015fa\u011f\u0131da en taze do\u011frulanabilir g\u00f6r\u00fc\u015f sinyalleri var.\n\n| Ki\u015fi | G\u00f6r\u00fc\u015f \u00d6zeti | Tarih | Kaynak |\n|------|-------------|-------|--------|\n| Sam Altman | AI sekt\u00f6r\u00fcn\u00fcn kamuoyuna kendini anlatma bi\u00e7iminde sorun oldu\u011funu, backlash\u2019in ciddiye al\u0131nmas\u0131 gerekti\u011fini ima eden daha savunmac\u0131 bir ton yans\u0131d\u0131. | 16 Nisan 2026 | [Axios](https://www.axios.com/2026/04/16/ai-industry-narrative-altman-amodei-pichai) |\n| Simon Willison | Meta\u2019n\u0131n Muse Spark \u00e7\u0131k\u0131\u015f\u0131n\u0131 \u201chosted, tool-rich, API preview\u201d ekseninde okuyup model+\u00fcr\u00fcn y\u00fczeyini birlikte analiz
