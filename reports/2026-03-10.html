T-4/KAT-9 | GitHub | \ud83d\udd34 |\n| 4 | **Claude Firefox'ta 22 G\u00fcvenlik A\u00e7\u0131\u011f\u0131 Buldu (14 High-Severity)** \u2014 Anthropic-Mozilla i\u015fbirli\u011fi: Claude Opus 4.6, 2 haftada 6000 C++ dosyas\u0131n\u0131 tarad\u0131, 112 bug raporu, 22 yeni CVE. Use-after-free'yi 20 dakikada tespit etti. T\u00fcm\u00fc Firefox 148'de yamaland\u0131. [\ud83d\udd17 techcrunch.com](https://techcrunch.com/2026/03/06/anthropics-claude-found-22-vulnerabilities-in-firefox-over-two-weeks/) | KAT-1/KAT-9 | TechCrunch, Mozilla Blog, TheHackerNews | \ud83d\udd34 |\n| 5 | **Nscale $2B Series C \u2014 Avrupa Tarihinin En B\u00fcy\u00fck AI Yat\u0131r\u0131m\u0131** \u2014 $14.6B de\u011ferleme, NVIDIA/Dell/Nokia yat\u0131r\u0131mc\u0131. Sheryl Sandberg ve Nick Clegg y\u00f6netim kuruluna kat\u0131ld\u0131. GPU compute + veri altyap\u0131s\u0131. [\ud83d\udd17 cnbc.com](https://www.cnbc.com/2026/03/09/nscale-ai-data-center-nvidia-raise.html) | KAT-1/KAT-7 | CNBC, PitchBook | \ud83d\udfe1 |\n| 6 | **DeepSeek V4 \u2014 Trilyon Parametre, Huawei Ascend Optimizasyonu** \u2014 1M context, ~32B aktif parametre, native multimodal. \u00c7in'in Two Sessions'a denk gelecek \u015fekilde Mart ba\u015f\u0131nda soft-launch yap\u0131ld\u0131. $0.14/M token fiyat. ABD chipmaker'lar\u0131na g\u00f6sterilmedi, sadece Huawei/Cambricon. [\ud83d\udd17 technode.com](https://technode.com/2026/03/02/deepseek-plans-v4-multimodal-model-release-this-week-sources-say/) | KAT-1 | TechNode, FT | \ud83d\udfe1 |\n| 7 | **Microsoft Phi-4-reasoning-vision-15B \u2014 K\u00fc\u00e7\u00fck ama G\u00fc\u00e7l\u00fc Multimodal** \u2014 15B parametre, open-weight, SigLIP-2 + Phi-4 fusion. Sadece 200B token ile e\u011fitildi (rakiplerin 1/5'i). Matematik, bilim ve GUI anlama odakl\u0131. [\ud83d\udd17 arxiv.org/abs/2603.03975](https://arxiv.org/abs/2603.03975) | KAT-3 | arXiv, Microsoft Research | \ud83d\udfe1 |\n\n**Dedupe notu:** Elenen konular \u2014 GPT-5.4 API \u00e7\u0131k\u0131\u015f\u0131 (KAT-1,
