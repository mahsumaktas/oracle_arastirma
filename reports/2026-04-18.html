3d\udd17](https://arxiv.org/abs/2604.14930) | KAT-2 | [arXiv 2604.14930](https://arxiv.org/abs/2604.14930) | \ud83d\udd34 |\n| 4 | **`Abstract Sim2Real through Approximate Information States` yay\u0131nland\u0131** \u2014 Sim2Real\u2019i ham g\u00f6zlem e\u015fle\u015ftirmesi yerine soyut bilgi durumlar\u0131yla kuruyor; embodied transfer taraf\u0131nda g\u00fc\u00e7l\u00fc sinyal. [\ud83d\udd17](https://arxiv.org/abs/2604.15289) | KAT-8 | [arXiv 2604.15289](https://arxiv.org/abs/2604.15289) | \ud83d\udd34 |\n| 5 | **Robotikte in-context imitation i\u00e7in hiyerar\u015fik action tokenizer \u00f6nerildi** \u2014 robot eylemlerini spatiotemporal token\u2019lara b\u00f6l\u00fcp context i\u00e7inden taklit \u00f6\u011frenmesini iyile\u015ftirmeyi ama\u00e7l\u0131yor. [\ud83d\udd17](https://arxiv.org/abs/2604.15215) | KAT-8 | [arXiv 2604.15215](https://arxiv.org/abs/2604.15215) | \ud83d\udfe1 |\n| 6 | **`Generalization in LLM Problem Solving: The Case of the Shortest Path` d\u00fc\u015ft\u00fc** \u2014 LLM\u2019lerin formel problem \u00e7\u00f6zmede ger\u00e7ekten genelle\u015fip genelle\u015fmedi\u011fini en temel grafik g\u00f6revlerinden biri \u00fczerinden test ediyor. [\ud83d\udd17](https://arxiv.org/abs/2604.15306) | KAT-3 | [arXiv 2604.15306](https://arxiv.org/abs/2604.15306) | \ud83d\udfe1 |\n| 7 | **Mistral 3 duyuruldu** \u2014 `Mistral Large 3` ile 3B/8B/14B `Ministral 3` ailesi Apache 2.0 alt\u0131nda a\u00e7\u0131ld\u0131; edge\u2192datacenter hatt\u0131n\u0131 tek ailede topluyor. [\ud83d\udd17](https://mistral.ai/it/news/mistral-3) | KAT-1 | [Mistral AI](https://mistral.ai/it/news/mistral-3) | \ud83d\udd34 |\n\n**Dedupe notu:** Elenenler: GPT-5.4-Cyber, Gemini 3.1 Flash TTS, Gemini Robotics-ER 1.6, MCP supply-chain alarm\u0131, OccuBench, TREX, Apple beta sweep.\n\n---\n\n## \ud83e\udd16 KAT-1 \u00b7 AI Laboratuvarlar\u0131 & Model Haberleri\n\n- **Mistral 3 tek net taze model-drop** \u2014 `Mistral Large 3` + `Ministral 3` ailesi Apache 2.0 ile a\u00e7\u0 blog](https://blog.modelcontextprotocol.io/)\n\n---\n\n## \ud83d\udcc4 KAT-3 \u00b7 Makaleler & Ara\u015ft\u0131rma\n\n| arXiv ID | Ba\u015fl\u0131k | Neden \u00d6nemli | Kaynak |\n|----------|--------|--------------|--------|\n| 2604.15224 | Context Over Content: Exposing Evaluation Faking in Automated Judges | LLM judge/eval hatlar\u0131n\u0131n ba\u011flamsal leakage ile kand\u0131r\u0131labildi\u011fini g\u00f6steriyor; eval boru hatt\u0131 tasar\u0131m\u0131 i\u00e7in direkt kritik. | [arXiv](https://arxiv.org/abs/2604.15224) |\n| 2604.15149 | LLMs Gaming Verifiers: RLVR can Lead to Reward Hacking | Verifier-centric RL\u2019in \u201cger\u00e7ek \u00e7\u00f6z\u00fcm\u201d yerine \u201c\u00f6d\u00fcl mekanizmas\u0131n\u0131 hackleme\u201d davran\u0131\u015f\u0131 \u00fcretebildi\u011fini s\u00f6yl\u00fcyor. | [arXiv](https://arxiv.org/abs/2604.15149) |\n| 2604.15306 | Generalization in LLM Problem Solving: The Case of the Shortest Path | LLM\u2019lerin sembolik/algoritmik genelleme kapasitesini basit ama sert bir g\u00f6revle test ediyor. | [arXiv](https://arxiv.org/abs/2604.15306) |\n| 2604.14930 | IE as Cache: Information Extraction Enhanced Agentic Reasoning | Agent loop\u2019a \u00e7\u0131kar\u0131m \u00f6nbelle\u011fi koyarak reasoning maliyetini ve context da\u011f\u0131n\u0131kl\u0131\u011f\u0131n\u0131 azaltmaya oynuyor. | [arXiv](https://arxiv.org/abs/2604.14930) |\n| 2604.15289 | Abstract Sim2Real through Approximate Information States | Sim2Real ge\u00e7i\u015fini soyut bilgi durumlar\u0131 \u00fczerinden kurarak transfer k\u0131r\u0131lganl\u0131\u011f\u0131n\u0131 d\u00fc\u015f\u00fcrmeye \u00e7al\u0131\u015f\u0131yor. | [arXiv](https://arxiv.org/abs/2604.15289) |\n| 2604.15215 | A Hierarchical Spatiotemporal Action Tokenizer for In-Context Imitation Learning in Robotics | Robot eylem dizilerini token-space\u2019e \u00e7ekip in-context imitation\u2019\u0131 daha veri verimli hale getirmeyi hedefliyor. | [arXiv](https://arxiv.org/abs/2604.15215) |\n\n
